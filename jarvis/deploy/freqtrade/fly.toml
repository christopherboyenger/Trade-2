# Fly.io deploy for the Jarvis Freqtrade engine.
# Usage: fly launch --no-deploy --copy-config --name jarvis-freqtrade
#        fly deploy
app = "jarvis-freqtrade"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
